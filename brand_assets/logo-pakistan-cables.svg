<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56">
  <!-- Cable coil icon -->
  <g transform="translate(4,6)">
    <!-- Outer circle -->
    <circle cx="22" cy="22" r="18" fill="none" stroke="#C8102E" stroke-width="2.8"/>
    <!-- Inner rings representing cable cross-section -->
    <circle cx="22" cy="22" r="11" fill="none" stroke="#C8102E" stroke-width="2.2"/>
    <circle cx="22" cy="22" r="4" fill="#C8102E"/>
    <!-- Conductor lines -->
    <line x1="22" y1="4" x2="22" y2="11" stroke="#C8102E" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="33" x2="22" y2="40" stroke="#C8102E" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="22" x2="11" y2="22" stroke="#C8102E" stroke-width="2" stroke-linecap="round"/>
    <line x1="33" y1="22" x2="40" y2="22" stroke="#C8102E" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Wordmark stacked -->
  <text x="58" y="26" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="12" letter-spacing="0.8" fill="#C8102E">PAKISTAN</text>
  <text x="58" y="42" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="12" letter-spacing="0.8" fill="#1A1A2E">CABLES</text>
</svg>
